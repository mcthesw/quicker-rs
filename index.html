<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Quicker-RS Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #08131f;
        --bg-1: #10243a;
        --bg-2: #1e4668;
        --line: rgba(202, 221, 255, 0.18);
        --text: #eef5ff;
        --muted: #9fb6d1;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(89, 162, 255, 0.18), transparent 34%),
          linear-gradient(160deg, var(--bg-0), var(--bg-1) 55%, var(--bg-2));
        color: var(--text);
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(1280px, 100%);
        min-height: min(900px, calc(100vh - 48px));
        border: 1px solid var(--line);
        border-radius: 28px;
        overflow: hidden;
        background: rgba(4, 13, 24, 0.72);
        backdrop-filter: blur(18px);
        box-shadow: 0 24px 120px rgba(0, 0, 0, 0.42);
      }

      .banner {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.05), transparent);
      }

      .title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .subtitle {
        margin-top: 4px;
        font-size: 13px;
        color: var(--muted);
      }

      .note {
        align-self: center;
        font-size: 12px;
        color: var(--muted);
        text-align: right;
      }

      canvas {
        display: block;
        width: 100%;
        height: calc(min(900px, calc(100vh - 48px)) - 74px);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="banner">
        <div>
          <div class="title">Quicker-RS Web Preview</div>
          <div class="subtitle">
            Browser-safe wasm build for UI previewing on GitHub Pages.
          </div>
        </div>
        <div class="note">
          Native hotkeys, shell commands, and focused-window hooks stay in the
          desktop binary.
        </div>
      </section>
      <canvas id="quicker-canvas"></canvas>
    </main>
    <script type="module">
      import init from "./app/quicker_rs.js";

      init();
    </script>
  </body>
</html>
